name: Build

on:
  workflow_call:
    inputs: 
      platform:
        required: true
        type: string
      developer-dir:
        required: true
        type: string

env:
    DEVELOPER_DIR: ${{ inputs.developer-dir }}
    PLATFORM: ${{ inputs.platform }}

jobs:
  build-openssl:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch Build script
        run: |
          cd td 
          find ../builder/openssl-patches -maxdepth 1 -name '*.patch' | sort | while read patch; do
            git apply "$patch"
          done

      - name: Cache Openssl
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: td/example/ios/third_party/openssl/${{ env.PLATFORM }}
          key: openssl-v1-${{ env.PLATFORM }}-${{ inputs.developer-dir }}-${{ hashFiles('td/example/ios/build-openssl.sh', 'td/example/ios/Python-Apple-support.patch', 'builder/openssl-patches/**') }}

      - name: Install deps
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          brew install gperf coreutils # cmake
          cmake --version
          gperf --version

      - name: Build Openssl
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: |
          cd td/example/ios
          ./build-openssl.sh $PLATFORM

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openssl-${{ env.PLATFORM }}
          path: td/example/ios/third_party/openssl/${{ env.PLATFORM }}
          if-no-files-found: error

  build-tdlib:
    runs-on: macos-15
    needs: [build-openssl]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Patch Build
        run: |
          cd td
          find ../builder/tdlib-patches -maxdepth 1 -name '*.patch' | sort | while read patch; do
            git apply "$patch"
          done

      - name: Cache tdlib
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: td/example/ios/build/install-${{ env.PLATFORM }}
          key: tdlib-install-v2-${{ env.PLATFORM }}-${{ inputs.developer-dir }}-${{ hashFiles('td/**', 'builder/tdlib-patches/**') }}

      - name: Restore ccache cache
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        id: cache-ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: tdlib-ccache-v2-${{ env.PLATFORM }}-${{ inputs.developer-dir }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            tdlib-ccache-v2-${{ env.PLATFORM }}-${{ inputs.developer-dir }}-${{ github.ref }}-
            tdlib-ccache-v2-${{ env.PLATFORM }}-${{ inputs.developer-dir }}-

      - name: Install deps
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: brew install gperf coreutils ccache # cmake
    
      # - name: Upgrade cmake  # we need 3.28.2 to escape "SDK settings were ignored as 'SDKSettings.json' could not be parsed" on Xcode 14.2 and tvOS
      #   if: env.PLATFORM == 'tvOS'
      #   run: brew update && brew upgrade cmake

      - name: Download Artifacts
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        uses: actions/download-artifact@v4
        with:
          name: openssl-${{ env.PLATFORM }}
          path: td/example/ios/third_party/openssl/${{ env.PLATFORM }}

      # Sources are pregenerated in build phase for macOS
      - name: Pregenerate Sources
        if: steps.cache-tdlib.outputs.cache-hit != 'true' && env.PLATFORM  != 'macOS'
        run: |
          cd td
          mkdir native-build
          cd native-build
          cmake -DTD_GENERATE_SOURCE_FILES=ON ..
          cmake --build .

      - name: Reset ccache stats
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        run: |
          mkdir -p "${{ runner.temp }}/ccache"
          ccache --zero-stats
          ccache --show-config

      - name: Build TDLib
        if: steps.cache-tdlib.outputs.cache-hit != 'true'
        env:
          CCACHE_LOGFILE: ${{ runner.temp }}/ccache/ccache-${{ env.PLATFORM }}.log
        run: |
          cd td/example/ios
          if [[ $PLATFORM == "visionOS"* ]]; then
              # NOTE: for visionOS, no (-mxros-version-min) flag exists yet, so we omit the flag completely
              ./build.sh $PLATFORM ""
          else
              ./build.sh $PLATFORM "$(python3 ../../../scripts/extract_os_version.py ${PLATFORM})"
          fi
          

      - name: Archive ccache logs
        if: ${{ always() }}
        run: |
          CCACHE_DIR="${{ runner.temp }}/ccache"
          # Keep this path in sync with CCACHE_LOGFILE in "Build TDLib", or move CCACHE_LOGFILE to job-level env.
          CCACHE_LOG="$CCACHE_DIR/ccache-${{ env.PLATFORM }}.log"
          CCACHE_LOGS_DIR="${{ runner.temp }}/ccache-logs"
          ARCHIVE="${{ runner.temp }}/tdlib-ccache-logs-${{ env.PLATFORM }}.zip"

          mkdir -p "$CCACHE_DIR" "$CCACHE_LOGS_DIR"

          if ! ccache --show-config --verbose > "$CCACHE_LOGS_DIR/ccache-config.txt" 2>&1; then
            rm -f "$CCACHE_LOGS_DIR/ccache-config.txt"
          fi

          if ! ccache --show-stats --verbose | tee "$CCACHE_LOGS_DIR/ccache-stats.txt"; then
            rm -f "$CCACHE_LOGS_DIR/ccache-stats.txt"
          fi

          if [ -f "$CCACHE_LOG" ]; then
            cp "$CCACHE_LOG" "$CCACHE_LOGS_DIR/ccache.log" || true
          fi

          shopt -s nullglob
          files=("$CCACHE_LOGS_DIR"/*)
          if [ ${#files[@]} -gt 0 ]; then
            (cd "$CCACHE_LOGS_DIR" && zip -q -r "$ARCHIVE" .) || rm -f "$ARCHIVE"
          fi

      - name: Upload ccache logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-ccache-logs-${{ env.PLATFORM }}
          path: ${{ runner.temp }}/tdlib-ccache-logs-${{ env.PLATFORM }}.zip
          if-no-files-found: warn

      - name: Upload ${{ env.PLATFORM }} install artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-install-${{ env.PLATFORM }}
          path: td/example/ios/build/install-${{ env.PLATFORM }}
          if-no-files-found: error

  build-framework:
    runs-on: macos-15
    needs: [build-tdlib]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download Openssl
        uses: actions/download-artifact@v4
        with:
          name: openssl-${{ env.PLATFORM }}
          path: td/example/ios/third_party/openssl/${{ env.PLATFORM }}

      - name: Download TDLib ${{ env.PLATFORM }} install
        uses: actions/download-artifact@v4
        with:
          name: tdlib-install-${{ env.PLATFORM }}
          path: td/example/ios/build/install-${{ env.PLATFORM }}

      - name: Patch headers
        working-directory: ./builder
        run: ./patch-headers.sh

      - name: Generate project
        env:
          MISE_GITHUB_TOKEN: ${{ secrets.MISE_GITHUB_TOKEN }}
        run: |
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$PATH"
          
          mise install # Installs the tools in .mise.toml
          eval "$(mise activate bash --shims)" # Adds the activated tools to $PATH

          cd builder
          TUIST_PLATFORM=$PLATFORM tuist generate

      # https://github.com/actions/runner-images/issues/10692
      - uses: ./.github/actions/install-visionos-runtime
        if: ${{ env.PLATFORM == 'visionOS' || env.PLATFORM == 'visionOS-simulator' }}
        with:
          developer_dir: ${{ env.DEVELOPER_DIR }}

      - name: Build .framework
        working-directory: ./builder
        run: ./build-framework.sh $PLATFORM

      - name: Compress xcarchive
        run: |
          cd builder/build
          zip --symlinks -r ${{ env.PLATFORM }}.xcarchive.zip ${{ env.PLATFORM }}.xcarchive

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xcarchive-${{ env.PLATFORM }}
          path: ./builder/build/${{ env.PLATFORM }}.xcarchive.zip
          if-no-files-found: error
